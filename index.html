<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLC Step Response Simulator</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="js/rlc.js" defer></script>
    <script src="js/charts.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <h1>RLC Lab </h1>
                <p>Advanced Step & AC Response</p>
            </header>

            <div class="diagram-container">
                <div id="circuit-diagram">
                    <!-- SVG will be injected here by ui.js -->
                </div>
            </div>

            <div class="tab-group">
                <button id="tab-time" class="active">Time domain</button>
                <button id="tab-freq">Frequency domain</button>
            </div>

            <div class="control-section">
                <label class="section-label">Topology</label>
                <div class="toggle-group">
                    <button id="btn-series" class="active">Series</button>
                    <button id="btn-parallel">Parallel</button>
                </div>
            </div>

            <div class="control-section">
                <label class="section-label">Source Mode</label>
                <div class="toggle-group">
                    <button id="mode-step" class="active">Step</button>
                    <button id="mode-sine">Sine</button>
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="val-r">Resistance (R): <span><span id="label-r">50</span> Ω</span></label>
                    <input type="range" id="val-r" min="0" max="1000" step="1" value="50">
                </div>
                <div class="control-group">
                    <label for="val-l">Inductance (L): <span><span id="label-l">100</span> mH</span></label>
                    <input type="range" id="val-l" min="1" max="1000" step="1" value="100">
                </div>
                <div class="control-group">
                    <label for="val-c">Capacitance (C): <span><span id="label-c">100</span> µF</span></label>
                    <input type="range" id="val-c" min="1" max="1000" step="1" value="100">
                </div>
                <div class="control-group">
                    <label for="val-vin">Amplitude (<span id="amp-sym">Vin</span>): <span><span id="label-vin">5</span> <span id="amp-unit">V</span></span></label>
                    <input type="range" id="val-vin" min="1" max="24" step="0.1" value="5">
                </div>
                <div id="freq-control" class="control-group hidden">
                    <label for="val-f">Source Frequency (f): <span><span id="label-f">60</span> Hz</span></label>
                    <input type="range" id="val-f" min="1" max="5000" step="10" value="60">
                </div>
            </div>

            <div class="info-panel">
                <div class="info-item">
                    <span>ζ (Damping Ratio):</span>
                    <strong id="out-zeta">0.00</strong>
                </div>
                <div class="info-item">
                    <span>ωₙ (Natural Freq):</span>
                    <strong id="out-wn">0.00 <small>rad/s</small></strong>
                </div>
                <div class="info-item">
                    <span>ωd (Damped Freq):</span>
                    <strong id="out-wd">0.00 <small>rad/s</small></strong>
                </div>
                <div class="info-item">
                    <span>ts (Settling Time):</span>
                    <strong id="out-ts">0.00 <small>ms</small></strong>
                </div>
                <div class="badge" id="out-condition">Underdamped</div>
            </div>
        </aside>

        <main class="content-area">
            <section id="view-time" class="charts-container active">
                <div class="chart-wrapper">
                    <div class="chart-header">
                        <h3>Capacitor Voltage v_c(t)</h3>
                        <button class="export-btn" onclick="ChartManager.exportPNG('voltage')">Download PNG</button>
                    </div>
                    <canvas id="chart-voltage"></canvas>
                </div>
                <div class="chart-wrapper">
                    <div class="chart-header">
                        <h3>Circuit Current i(t)</h3>
                        <button class="export-btn" onclick="ChartManager.exportPNG('current')">Download PNG</button>
                    </div>
                    <canvas id="chart-current"></canvas>
                </div>
                <div class="chart-wrapper">
                    <div class="chart-header">
                        <h3>Energy Consumption</h3>
                        <button class="export-btn" onclick="ChartManager.exportPNG('energy')">Download PNG</button>
                    </div>
                    <canvas id="chart-energy"></canvas>
                </div>
            </section>
            
            <section id="view-freq" class="charts-container">
                <div class="chart-wrapper full">
                    <div class="chart-header">
                        <h3>Frequency Response Magnitude |H(jω)|</h3>
                        <button class="export-btn" onclick="ChartManager.exportPNG('bode')">Download PNG</button>
                    </div>
                    <canvas id="chart-bode"></canvas>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
